- name: Instal some pkgs and uninstall some pkgs
  hosts: web
  become: yes
  tasks:
  - name: install pkg and uninstall pkg
    ansible.builtin.package:
      name: "{{item.name}}"
      state: "{{item.state}}"
    loop:
    - {name: 'git', state='present'}
    - {name: 'mysql', state='absent'}
    - {name: 'postfix', state='absent'}
    - {name: 'nginx', state='present'}
